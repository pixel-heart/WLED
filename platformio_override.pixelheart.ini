[platformio]
#
# This list defines what firmwares to build. You can remove the # before the name to enable it. Add a # in front of the line to disable.
# Make sure at least 1 is enabled before triggering the build process.
# Hardware definitions are based on WLED 16.0.1 and the matching vendor firmware configurations.
#
default_envs =
# Dig2Go
  ph_dig2go
# MagWLED ESP32-C3
  ph_c3_magwled
# MagWLED Pro ESP32-S3
  ph_s3_magwled_pro
# QuinLED Dig-Uno V3 with ESP32-AE+ module
  ph_dig_uno_v3_aeplus
# QuinLED Dig-Quad V3
  ph_dig_quad_v3


#
#
# Dig2Go
#
#
[env:ph_dig2go]
board = esp32dev
platform = ${esp32.platform}
build_unflags = ${common.build_unflags}
board_build.flash_mode = dio
custom_usermods = audioreactive
build_flags = ${common.build_flags} ${esp32.build_flags}
  -D WLED_DISABLE_BLYNK
  -D IR_ENABLE_DEFAULT=true
  -D WLED_RELEASE_NAME=\"pixel_heart_dig2go\"
  -D SERVERNAME="\"pixel_heart_dig2go\""
  -D LEDPIN=16
  -D DEFAULT_LED_COUNT=300
  -D ABL_MILLIAMPS_DEFAULT=1250
  -D RLYPIN=12
  -D BTNPIN=0
  -D IRPIN=5
  -D DMENABLED=1
  ${esp32.AR_build_flags}
	-D UM_AUDIOREACTIVE_ENABLE
  -D SR_DMTYPE=1
  -D I2S_SDPIN=19
  -D I2S_WSPIN=4
  -D I2S_CKPIN=18
  -D SR_SQUELCH=10
  -D SR_GAIN=30
lib_deps = ${esp32.lib_deps}
  ${esp32.AR_lib_deps}
monitor_filters = esp32_exception_decoder
board_build.partitions = ${esp32.default_partitions}
extra_scripts = ${scripts_defaults.extra_scripts}




[env:ph_c3_magwled]
extends = env:esp32c3dev
build_flags = ${common.build_flags} ${esp32c3.build_flags}
  -D WLED_WATCHDOG_TIMEOUT=0
  -DLOLIN_WIFI_FIX
  -DARDUINO_USB_CDC_ON_BOOT=1
  -D BTNPIN=9
  -D RLYPIN=5
  -D I2S_SDPIN=10
  -D I2S_WSPIN=6
  -D I2S_CKPIN=7
  -D MCLK_PIN=-1
	-D WLED_RELEASE_NAME=\"pixel_heart_magwled\"
  -D SERVERNAME="\"pixel_heart_magwled\""
  ; -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
  -D TCP_LISTEN_BACKLOG=1

lib_deps =
  ${esp32c3.lib_deps}

[env:ph_s3_magwled_pro]
extends = env:esp32s3dev_8MB_opi
build_flags = ${common.build_flags} ${esp32s3.build_flags}
  -D WLED_WATCHDOG_TIMEOUT=0
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  -D BTNPIN=0
  -D RLYPIN=5
  -D I2S_SDPIN=16
  -D I2S_WSPIN=15
  -D I2S_CKPIN=17
  -D MCLK_PIN=-1
	-D WLED_RELEASE_NAME=\"pixel_heart_magwled_pro\"
  -D SERVERNAME="\"pixel_heart_magwled_pro\""
  ; -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
  -D TCP_LISTEN_BACKLOG=1

lib_deps =
  ${esp32s3.lib_deps}


#
# QuinLED Dig-Uno V3 with ESP32-AE+ module
# Hardware definition derived from intermittech/QuinLED-Firmware.
#
[env:ph_dig_uno_v3_aeplus]
board = esp32dev
platform = ${esp32.platform}
platform_packages = ${esp32.platform_packages}
board_build.flash_mode = dio
board_build.partitions = ${esp32.default_partitions}
build_unflags = ${common.build_unflags}
custom_usermods = audioreactive multi_relay temperature
build_flags = ${common.build_flags} ${esp32.build_flags}
  -D WLED_DISABLE_BLYNK
  -D WLED_PRODUCT_NAME="\"Dig-Uno-V3-AEPlus\""
  -D WLED_RELEASE_NAME=\"pixel_heart_dig_uno_v3_aeplus\"
  -D SERVERNAME="\"pixel_heart_dig_uno_v3_aeplus\""
  -D NOWIFISLEEP=false
  -D BTNPIN=33
  -D IRPIN=26
  -D PIXEL_COUNTS=30,30,30,30,30
  -D DATA_PINS=16,3,21,17,22
  -D ABL_MILLIAMPS_DEFAULT=1250
  -D USERMOD_MULTI_RELAY
  -D MULTI_RELAY_MAX_RELAYS=4
  -D MULTI_RELAY_PINS=15,-1,-1,-1
  -D UM_AUDIOREACTIVE_ENABLE
  -D SR_DMTYPE=1
  -D I2S_SDPIN=25
  -D I2S_WSPIN=27
  -D I2S_CKPIN=32
  -D SR_SQUELCH=10
  -D SR_GAIN=30
  -D USERMOD_DALLASTEMPERATURE
  -D TEMPERATURE_PIN=13
  ${esp32.AR_build_flags}
lib_deps = ${esp32.lib_deps}
  OneWire@~2.3.5
  milesburton/DallasTemperature@^3.9.0
  ${esp32.AR_lib_deps}
monitor_filters = esp32_exception_decoder
extra_scripts = ${scripts_defaults.extra_scripts}


#
# QuinLED Dig-Quad V3
# Hardware definition derived from intermittech/QuinLED-Firmware.
#
[env:ph_dig_quad_v3]
board = esp32dev
platform = ${esp32.platform}
platform_packages = ${esp32.platform_packages}
board_build.flash_mode = dio
board_build.partitions = ${esp32.default_partitions}
build_unflags = ${common.build_unflags}
custom_usermods = audioreactive multi_relay temperature
build_flags = ${common.build_flags} ${esp32.build_flags}
  -D WLED_DISABLE_BLYNK
  -D WLED_PRODUCT_NAME="\"Dig-Quad-V3\""
  -D WLED_RELEASE_NAME=\"pixel_heart_dig_quad_v3\"
  -D SERVERNAME="\"pixel_heart_dig_quad_v3\""
  -D NOWIFISLEEP=false
  -D BTNPIN=0
  -D IRPIN=-1
  -D PIXEL_COUNTS=30,30,30,30
  -D DATA_PINS=16,3,1,4
  -D ABL_MILLIAMPS_DEFAULT=1250
  -D USERMOD_MULTI_RELAY
  -D MULTI_RELAY_MAX_RELAYS=4
  -D MULTI_RELAY_PINS=15,-1,-1,-1
  -D UM_AUDIOREACTIVE_ENABLE
  -D SR_DMTYPE=1
  -D I2S_SDPIN=-1
  -D I2S_WSPIN=-1
  -D I2S_CKPIN=-1
  -D SR_SQUELCH=10
  -D SR_GAIN=30
  -D WLED_USE_ETHERNET
  -D WLED_ETH_DEFAULT=4
  -D USERMOD_DALLASTEMPERATURE
  -D TEMPERATURE_PIN=13
  ${esp32.AR_build_flags}
lib_deps = ${esp32.lib_deps}
  OneWire@~2.3.5
  milesburton/DallasTemperature@^3.9.0
  ${esp32.AR_lib_deps}
monitor_filters = esp32_exception_decoder
extra_scripts = ${scripts_defaults.extra_scripts}
